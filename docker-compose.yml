version: '3.8'

services:
  shwi-app:
    image: hasan10100/shwi-app:latest 
    build:
      context: .
      dockerfile: Dockerfile
    container_name: SHWI-docker
    ports:
      - "5000:5000"
    environment:
      - PORT=5000
      - NODE_ENV=production
    env_file:
      - ./backend/.env
    restart: unless-stopped